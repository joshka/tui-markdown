version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Delay fresh releases so supply-chain attacks have time to be discovered.
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: "increase-if-necessary"
    open-pull-requests-limit: 3
    # Delay fresh releases so supply-chain attacks have time to be discovered.
    cooldown:
      default-days: 7
    groups:
      cargo-dependencies:
        patterns:
          - "*"
